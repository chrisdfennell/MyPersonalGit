name: GitHub Release & Docker Push

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag and bump version
        id: tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+' | head -1)
          if [ -z "$LATEST" ]; then LATEST="v1.15.0"; fi
          VERSION=${LATEST#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=${PATCH:-0}
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

          if git rev-parse "$LATEST" >/dev/null 2>&1; then
            CHANGELOG=$(git log "$LATEST"..HEAD --pretty=format:"- %s" --no-merges | head -50)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create tag and release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.new_tag }}" -m "Release ${{ steps.tag.outputs.new_tag }}"
          git push origin "${{ steps.tag.outputs.new_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: |
            ## Changes

            ${{ steps.tag.outputs.changelog }}

            ## Docker

            ```bash
            docker pull fennch/mypersonalgit:${{ steps.tag.outputs.new_tag }}
            ```

  docker:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: fennch
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            fennch/mypersonalgit:latest
            fennch/mypersonalgit:${{ needs.release.outputs.new_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
