name: Release & Docker Push

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: dotnet build --configuration Release

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  release-and-push:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: "0"

      - name: Determine version
        id: tag
        run: |
          git fetch --tags 2>/dev/null || true
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+' | head -1)
          if [ -z "$LATEST" ]; then LATEST="v1.15.0"; fi
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          PATCH=${PATCH:-0}
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT 2>/dev/null || true
          export NEW_TAG
          echo "$NEW_TAG" > /tmp/new_tag

      - name: Create git tag
        run: |
          NEW_TAG=$(cat /tmp/new_tag 2>/dev/null || echo "latest")
          git config user.name "ci-bot"
          git config user.email "ci@localhost"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG" 2>/dev/null || true
          git push origin "$NEW_TAG" 2>/dev/null || true

      - name: Generate changelog
        id: changelog
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+' | head -2 | tail -1)
          if [ -z "$LATEST" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges -20)
          else
            CHANGELOG=$(git log "$LATEST"..HEAD --pretty=format:"- %s" --no-merges | head -50)
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none 2>/dev/null | base64 2>/dev/null || echo "HEREDOC_END")
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT 2>/dev/null || true
          echo "$CHANGELOG" >> $GITHUB_OUTPUT 2>/dev/null || true
          echo "$EOF" >> $GITHUB_OUTPUT 2>/dev/null || true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Docker
            ```bash
            docker pull fennch/mypersonalgit:${{ steps.tag.outputs.new_tag }}
            ```

      - uses: docker/login-action@v3
        with:
          username: fennch
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        run: |
          NEW_TAG=$(cat /tmp/new_tag 2>/dev/null || echo "latest")
          echo "Building with tag: $NEW_TAG"
          echo "Working directory: $(pwd)"
          echo "Files: $(ls -la 2>/dev/null | head -5)"
          ls /workspace/Dockerfile 2>/dev/null && echo "Dockerfile found in /workspace"
          ls Dockerfile 2>/dev/null && echo "Dockerfile found in cwd"
          # Try current dir first, then /workspace
          BUILD_DIR="."
          if [ ! -f Dockerfile ] && [ -f /workspace/Dockerfile ]; then
            BUILD_DIR="/workspace"
          fi
          if [ -f "${BUILD_DIR}/Dockerfile" ]; then
            docker build -t fennch/mypersonalgit:latest -t "fennch/mypersonalgit:${NEW_TAG}" "${BUILD_DIR}"
            docker push fennch/mypersonalgit:latest
            docker push "fennch/mypersonalgit:${NEW_TAG}"
            echo "Pushed fennch/mypersonalgit:latest and fennch/mypersonalgit:${NEW_TAG}"
          else
            echo "No Dockerfile found in ${BUILD_DIR} or /workspace — listing contents:"
            ls -la /workspace/ 2>/dev/null | head -20
          fi
