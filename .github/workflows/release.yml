name: Release & Docker Push

on:
  workflow_dispatch:

permissions:
  contents: write
  security-events: write   # upload Trivy SARIF to the Security tab

jobs:
  release-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: "0"

      - name: Install .NET SDK
        run: |
          curl -fsSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          chmod +x /tmp/dotnet-install.sh
          /tmp/dotnet-install.sh --channel 10.0 --install-dir $HOME/.dotnet
          echo "$HOME/.dotnet" >> $GITHUB_PATH
          $HOME/.dotnet/dotnet --version

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Build
        run: dotnet build --configuration Release -maxcpucount:1
        env:
          DOTNET_GCHeapHardLimit: "0x100000000"

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Determine version
        id: tag
        run: |
          git fetch --tags 2>/dev/null || true
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+' | head -1)
          if [ -z "$LATEST" ]; then LATEST="v1.15.0"; fi
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          PATCH=${PATCH:-0}
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT 2>/dev/null || true
          export NEW_TAG
          echo "$NEW_TAG" > /tmp/new_tag

      - name: Create git tag
        run: |
          NEW_TAG=$(cat /tmp/new_tag 2>/dev/null || echo "latest")
          git config user.name "ci-bot"
          git config user.email "ci@localhost"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG" 2>/dev/null || true
          git push origin "$NEW_TAG" 2>/dev/null || true

      - name: Generate changelog
        id: changelog
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+' | head -2 | tail -1)
          if [ -z "$LATEST" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges -20)
          else
            CHANGELOG=$(git log "$LATEST"..HEAD --pretty=format:"- %s" --no-merges | head -50)
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none 2>/dev/null | base64 2>/dev/null || echo "HEREDOC_END")
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT 2>/dev/null || true
          echo "$CHANGELOG" >> $GITHUB_OUTPUT 2>/dev/null || true
          echo "$EOF" >> $GITHUB_OUTPUT 2>/dev/null || true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Docker
            ```bash
            docker pull fennch/mypersonalgit:${{ steps.tag.outputs.new_tag }}
            ```

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: fennch
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.tag.outputs.new_tag }}
            APP_COMMIT=${{ github.sha }}
          tags: |
            fennch/mypersonalgit:latest
            fennch/mypersonalgit:${{ steps.tag.outputs.new_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Supply-chain: SBOM + image vulnerability scan (non-blocking) ----
      # Best-effort; never fails the release. See nightly.yml for rationale.
      - name: Install Trivy
        continue-on-error: true
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM and scan image
        continue-on-error: true
        run: |
          IMAGE="fennch/mypersonalgit:${{ steps.tag.outputs.new_tag }}"
          trivy image --quiet --format cyclonedx  --output sbom.cyclonedx.json "$IMAGE" || true
          trivy image --quiet --format sarif --severity HIGH,CRITICAL --ignore-unfixed \
            --output trivy-results.sarif "$IMAGE" || true

      - name: Upload Trivy scan to Security tab
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      - name: Attach SBOM to release
        continue-on-error: true
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          files: sbom.cyclonedx.json
