name: Auto Release & Docker Push

on:
  push:
    branches: [main]

jobs:
  release-and-docker:
    runs-on: docker.io/library/docker:27-cli
    steps:
      - name: Determine version
        run: |
          cd /workspace
          git fetch --tags 2>/dev/null || true
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v1.15.0"
          fi
          echo "Latest tag: $LATEST"
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          PATCH=${PATCH:-0}
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New tag: $NEW_TAG"
          echo "$NEW_TAG" > /tmp/new_tag

      - name: Create git tag
        run: |
          cd /workspace
          NEW_TAG=$(cat /tmp/new_tag)
          git config user.name "mypersonalgit-ci"
          git config user.email "ci@localhost"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG" 2>/dev/null || echo "Tag push skipped (local)"

      - name: Build and push Docker image
        run: |
          NEW_TAG=$(cat /tmp/new_tag)
          cd /workspace
          echo "Building Docker image..."
          docker build -t fennch/mypersonalgit:latest -t "fennch/mypersonalgit:${NEW_TAG}" .
          echo "Logging in to Docker Hub..."
          echo "$DOCKERHUB_TOKEN" | docker login -u fennch --password-stdin
          echo "Pushing fennch/mypersonalgit:latest..."
          docker push fennch/mypersonalgit:latest
          echo "Pushing fennch/mypersonalgit:${NEW_TAG}..."
          docker push "fennch/mypersonalgit:${NEW_TAG}"
          echo "Done! Published ${NEW_TAG}"
