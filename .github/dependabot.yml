version: 2
updates:
  # .NET / NuGet dependencies for the app and test project.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Batch the routine framework/test bumps into one PR to cut noise.
      microsoft-and-test:
        patterns:
          - "Microsoft.*"
          - "xunit*"
          - "coverlet*"
          - "NSubstitute"
    commit-message:
      prefix: "deps"

  # Keep GitHub Actions pinned versions current (this is what surfaced the
  # actions/cache@v4 -> v5 Node 24 deprecation).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"

  # Base image updates for the container build.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "docker"
